services:
  postgres:
    image: postgres:18-alpine
    container_name: uber-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: uber_viajes
      POSTGRES_USER: uber
      POSTGRES_PASSWORD: uber
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uber -d uber_viajes"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
