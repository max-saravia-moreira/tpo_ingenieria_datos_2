services:
  mysql:
    image: mysql:8.4
    container_name: uber-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: uber_viajes
      MYSQL_USER: uber
      MYSQL_PASSWORD: uber
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u uber -puber --silent"]
      interval: 5s
      timeout: 5s
      retries: 5

  cassandra:
    image: cassandra:5.0
    container_name: uber-cassandra
    restart: unless-stopped
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_DC: datacenter1
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES'"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  cassandra-init:
    image: cassandra:5.0
    container_name: uber-cassandra-init
    depends_on:
      cassandra:
        condition: service_healthy
    command:
      - /bin/bash
      - -c
      - >
        cqlsh cassandra 9042 -e
        "CREATE KEYSPACE IF NOT EXISTS uber
        WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1};"
    restart: "no"

volumes:
  mysql_data:
  cassandra_data:
