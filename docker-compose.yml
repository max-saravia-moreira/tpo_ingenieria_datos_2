services:
  postgres:
    image: postgres:18-alpine
    container_name: uber-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: uber_viajes
      POSTGRES_USER: uber
      POSTGRES_PASSWORD: uber
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uber -d uber_viajes"]
      interval: 5s
      timeout: 5s
      retries: 5

  cassandra:
    image: cassandra:5.0
    container_name: uber-cassandra
    restart: unless-stopped
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_DC: datacenter1
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES'"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  cassandra-init:
    image: cassandra:5.0
    container_name: uber-cassandra-init
    depends_on:
      cassandra:
        condition: service_healthy
    command:
      - /bin/bash
      - -c
      - >
        cqlsh cassandra 9042 -e
        "CREATE KEYSPACE IF NOT EXISTS uber
        WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1};"
    restart: "no"

volumes:
  postgres_data:
  cassandra_data:
